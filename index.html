<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="總務採購">
<meta name="theme-color" content="#72A9FF">
<title>總務採購管理</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --blue: #72A9FF;
    --blue-light: #c8dcff;
    --blue-deep: #2a5fcf;
    --yellow: #FFE958;
    --yellow-dark: #b89a00;
    --gray-cool: #D7E0E6;
    --gray-cool-dark: #8fa3af;
    --bg: #eef4fb;
    --surface: #ffffff;
    --surface2: #deeaf8;
    --text: #1a2a3a;
    --text2: #4a6070;
    --text3: #8fa3af;
    --border: rgba(114,169,255,0.18);
    --accent: #72A9FF;
    --accent-bg: #deeaf8;
    --mandy: #e06fa0; --mandy-bg: #fce8f2;
    --jean: #c49a00; --jean-bg: #fff9d0;
    --kassy: #5a7ee0; --kassy-bg: #dce5ff;
    --isabel: #3aaa7a; --isabel-bg: #d0f5e6;
    --supplier: #2a5fcf; --supplier-bg: #deeaf8;
    --done-bg: #d0f5e6; --done-text: #1a7a50;
    --radius: 16px;
    --radius-sm: 10px;
    --tab-h: 64px;
    --header-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    height: var(--header-h);
    background: var(--blue);
    border-bottom: none;
    display: flex; align-items: center; padding: 0 16px;
    gap: 10px;
  }
  .header-title { font-size: 18px; font-weight: 700; flex: 1; color: #fff; letter-spacing: 0.02em; }
  .header-badge {
    background: rgba(255,255,255,0.25); color: #fff;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px; border-radius: 999px;
  }
  .reset-btn {
    font-size: 13px; color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px; padding: 4px 10px; cursor: pointer;
  }

  /* ── SEARCH ── */
  .search-wrap { padding: 10px 16px; background: var(--blue); border-bottom: none; }
  .search-input {
    width: 100%; padding: 9px 16px;
    background: rgba(255,255,255,0.9); border: none; border-radius: 999px;
    font-size: 15px; font-family: inherit; color: var(--text);
    outline: none;
  }
  .search-input::placeholder { color: var(--text3); }

  /* ── TABS ── */
  .tabs {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 10px 16px; background: var(--blue);
    border-bottom: none;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 6px 14px;
    border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.4);
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9);
    transition: all 0.15s;
  }
  .tab.active { background: #fff; border-color: #fff; }
  .tab[data-f="all"].active { color: var(--blue-deep); }
  .tab[data-f="supplier"].active { color: var(--supplier); }
  .tab[data-f="mandy"].active { color: var(--mandy); }
  .tab[data-f="jean"].active { color: var(--jean); }
  .tab[data-f="kassy"].active { color: var(--kassy); }
  .tab[data-f="isabel"].active { color: var(--isabel); }

  /* ── CONTENT ── */
  .content { padding: 16px; padding-bottom: calc(var(--tab-h) + 20px); }

  /* ── SECTION ── */
  .section { margin-bottom: 20px; }
  .section-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; padding: 0 2px;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .section-name { font-size: 14px; font-weight: 700; }
  .section-meta { font-size: 12px; color: var(--text2); }
  .tel { font-size: 11px; color: var(--text3); margin-left: auto; }

  /* ── ITEM CARD ── */
  .item {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: opacity 0.2s;
    cursor: pointer;
  }
  .item.done { opacity: 0.45; }
  .item.done .item-name { text-decoration: line-through; color: var(--text3); }

  .check-box {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 6px; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; margin-top: 1px;
  }
  .item.done .check-box { border-color: transparent; background: var(--blue-light); }
  .check-icon { display: none; }
  .item.done .check-icon { display: block; }
  .check-icon svg { width: 13px; height: 13px; }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .item-unit { font-size: 12px; color: var(--text2); }
  .item-note {
    display: inline-block; margin-top: 6px;
    font-size: 11px; padding: 3px 8px; border-radius: 6px;
    background: #fff6b0; color: #7a5a00;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: var(--tab-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    font-size: 10px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    padding: 8px 0; transition: color 0.15s;
  }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--blue-deep); }

  /* ── PROGRESS ── */
  .progress-wrap { padding: 0 16px 16px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 999px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 999px; background: var(--blue); transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; }

  /* ── EMPTY ── */
  .empty { text-align: center; color: var(--text3); padding: 3rem 1rem; font-size: 14px; }

  /* ── STATS PAGE ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .person-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .person-mini-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .person-mini-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }
  .person-count { font-size: 12px; color: var(--text2); min-width: 40px; text-align: right; }

  /* PAGE SWITCHING */
  .page { display: none; }
  .page.active { display: block; }

  .install-banner {
    background: var(--yellow); border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #5a4000;
  }
  .install-banner button {
    margin-left: auto; background: var(--blue-deep); color: #fff;
    border: none; border-radius: 999px; padding: 5px 14px; font-size: 12px; cursor: pointer;
  }
  .install-x { background: none; border: none; color: #8a7000; font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>

<div class="install-banner" id="install-banner">
  <span>安裝到主畫面，離線也能用</span>
  <button id="install-btn">安裝</button>
  <button class="install-x" onclick="document.getElementById('install-banner').style.display='none'">×</button>
</div>

<div class="header">
  <div class="header-title">總務採購</div>
  <span class="header-badge" id="done-badge">0 / 0 完成</span>
  <button class="reset-btn" onclick="resetAll()">重置</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="search" placeholder="搜尋品項..." id="search" oninput="render()" />
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-f="all" onclick="setFilter('all',this)">全部</div>
  <div class="tab" data-f="supplier" onclick="setFilter('supplier',this)">供應商</div>
  <div class="tab" data-f="mandy" onclick="setFilter('mandy',this)">Mandy</div>
  <div class="tab" data-f="jean" onclick="setFilter('jean',this)">Jean</div>
  <div class="tab" data-f="kassy" onclick="setFilter('kassy',this)">Kassy</div>
  <div class="tab" data-f="isabel" onclick="setFilter('isabel',this)">Isabel</div>
</div>

<div id="page-list" class="page active">
  <div class="progress-wrap" style="padding-top:14px;">
    <div class="progress-label"><span>本次採購進度</span><span id="prog-text">0%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="page-stats" class="page">
  <div class="content">
    <div class="stats-grid" id="stats-grid"></div>
    <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;">各負責人進度</div>
    <div id="person-stats"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-list" onclick="showPage('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    採購清單
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showPage('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    統計
  </button>
</nav>

<script>
const PERSONS = {
  supplier: { label: '供應商', color: '#185fa5', bg: '#e6f1fb' },
  mandy:    { label: 'Mandy',  color: '#d4537e', bg: '#fbeaf0' },
  jean:     { label: 'Jean',   color: '#ba7517', bg: '#faeeda' },
  kassy:    { label: 'Kassy',  color: '#534ab7', bg: '#eeedfe' },
  isabel:   { label: 'Isabel', color: '#0f6e56', bg: '#e1f5ee' },
};

const SECTIONS = [
  {
    id: 'beifeng', person: 'supplier',
    name: '北峰', tel: '2269-4000', meta: '收據月結（隔天到）',
    items: [
      { id: 'bf1', name: 'A4 白影印紙', unit: '一箱 10 包' },
      { id: 'bf2', name: 'A4 彩色紙（嫩黃/粉/藍/綠）', unit: '1 包' },
      { id: 'bf3', name: 'B4 白紙', unit: '1 包' },
    ]
  },
  {
    id: 'haohua', person: 'supplier',
    name: '豪華清潔用品', tel: '2296-1620', meta: '月結收據',
    items: [
      { id: 'hh1', name: '衛生紙', unit: '4 箱（至少 4 箱）', price: '$380/箱' },
      { id: 'hh2', name: '擦手紙', unit: '4 箱（至少 4 箱）', price: '$550/箱' },
      { id: 'hh3', name: '紙杯', unit: '1 箱（1箱=11條）', price: '$650/箱' },
    ]
  },
  {
    id: 'mandy', person: 'mandy',
    name: 'Mandy', meta: '總處文具採購',
    items: [
      { id: 'm1', name: '白板筆（紅黑藍綠橘）', unit: '1 盒' },
      { id: 'm2', name: '白板筆墨水（紅黑藍綠橘）', unit: '1 盒' },
      { id: 'm3', name: 'A4 / A3 護貝紙', unit: '1 盒' },
      { id: 'm4', name: '圖書袋', unit: '___ 個' },
      { id: 'm5', name: '圖書卡', unit: '___ 個' },
      { id: 'm6', name: '3M 透明膠帶', unit: '___ 個' },
      { id: 'm7', name: '哥大貼紙', unit: '___ 個' },
      { id: 'm8', name: '電腦標籤貼（常用104號）', unit: '1 盒' },
      { id: 'm9', name: 'A4 自黏袋', unit: '1 綑 500 個' },
    ]
  },
  {
    id: 'jean', person: 'jean',
    name: 'Jean', meta: '總處文具採購',
    items: [
      { id: 'j1', name: '酒精（問 Alin）', unit: '___ 罐（本校＋三校）' },
      { id: 'j2', name: '洗手乳（問 Alin）', unit: '一箱 12 瓶' },
      { id: 'j3', name: '餅乾', unit: '—', note: '跟叔叔確認二四時間點再 mail 給 Jean' },
      { id: 'j4', name: '白色信封', unit: '___ 個（基本 300 個）' },
      { id: 'j5', name: '書盒', unit: '___ 箱', note: '每學期新學期開始前一個月叫貨' },
      { id: 'j6', name: '哥大藍色提袋', unit: '___ 個', note: '新學期前一個月，需 ≥ 新生人數' },
      { id: 'j7', name: '哥大鉛筆', unit: '___ 包（一包 144 枝）' },
      { id: 'j8', name: '哥大 DM', unit: '___ 張（一箱 500 張，至少一箱）' },
      { id: 'j9', name: '哥大氣球用品', unit: '___ 包' },
      { id: 'j10', name: '哥大衛生紙', unit: '___ 箱（一箱 1000 包）' },
    ]
  },
  {
    id: 'kassy', person: 'kassy',
    name: 'Kassy', meta: '總處採購',
    items: [
      { id: 'k1', name: '藍色信封', unit: '—' },
      { id: 'k2', name: 'ES 教材包', unit: '—' },
      { id: 'k3', name: 'Flashcard 彩色列印', unit: '—' },
      { id: 'k4', name: 'ES 繪本', unit: '—' },
    ]
  },
  {
    id: 'isabel', person: 'isabel',
    name: 'Isabel', meta: '圖書館管理',
    items: [
      { id: 'i1', name: '圖書館採購', unit: '—' },
      { id: 'i2', name: '庫存管理', unit: '—' },
    ]
  },
];

let done = JSON.parse(localStorage.getItem('done') || '{}');
let filter = 'all';

function save() { localStorage.setItem('done', JSON.stringify(done)); }

function toggle(id) {
  done[id] = !done[id];
  if (!done[id]) delete done[id];
  save(); render(); renderStats();
}

function resetAll() {
  if (confirm('確定重置所有勾選？')) { done = {}; save(); render(); renderStats(); }
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const content = document.getElementById('content');
  const allItems = SECTIONS.flatMap(s => s.items);
  const totalDone = allItems.filter(it => done[it.id]).length;

  document.getElementById('done-badge').textContent = `${totalDone} / ${allItems.length} 完成`;
  const pct = Math.round(totalDone / allItems.length * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = pct + '%';

  let html = '';
  let anyVisible = false;

  SECTIONS.forEach(sec => {
    if (filter !== 'all' && filter !== sec.person) return;
    const visItems = sec.items.filter(it => !q || it.name.toLowerCase().includes(q));
    if (!visItems.length) return;
    anyVisible = true;

    const p = PERSONS[sec.person];
    const initials = sec.name.slice(0, 2);
    html += `<div class="section">
      <div class="section-head">
        <div class="avatar" style="background:${p.bg};color:${p.color}">${initials}</div>
        <div>
          <div class="section-name">${sec.name}</div>
          <div class="section-meta">${sec.meta}</div>
        </div>
        ${sec.tel ? `<div class="tel">${sec.tel}</div>` : ''}
      </div>`;

    visItems.forEach(it => {
      const isDone = !!done[it.id];
      html += `<div class="item${isDone ? ' done' : ''}" onclick="toggle('${it.id}')">
        <div class="check-box">
          <span class="check-icon"><svg viewBox="0 0 13 13" fill="none" stroke="#2a5fcf" stroke-width="2.5"><polyline points="1.5,6.5 5,10 11,2"/></svg></span>
        </div>
        <div class="item-body">
          <div class="item-name">${it.name}</div>
          <div class="item-unit">訂購單位：${it.unit}${it.price ? '　' + it.price : ''}</div>
          ${it.note ? `<span class="item-note">${it.note}</span>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = anyVisible ? html : '<div class="empty">找不到符合的品項</div>';
}

function renderStats() {
  const allItems = SECTIONS.flatMap(s => s.items);
  const totalDone = allItems.filter(it => done[it.id]).length;
  const total = allItems.length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">總品項數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#2a5fcf">${totalDone}</div><div class="stat-label">已訂購</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#c49a00">${total - totalDone}</div><div class="stat-label">待訂購</div></div>
    <div class="stat-card"><div class="stat-num">${Math.round(totalDone/total*100)}%</div><div class="stat-label">完成率</div></div>
  `;

  let personHtml = '';
  const personOrder = ['supplier','mandy','jean','kassy','isabel'];
  personOrder.forEach(pid => {
    const sections = SECTIONS.filter(s => s.person === pid);
    const items = sections.flatMap(s => s.items);
    const doneCount = items.filter(it => done[it.id]).length;
    const pct = items.length ? Math.round(doneCount / items.length * 100) : 0;
    const p = PERSONS[pid];
    personHtml += `<div class="person-row">
      <div class="avatar" style="background:${p.bg};color:${p.color};width:28px;height:28px;font-size:11px">${p.label.slice(0,2)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;margin-bottom:5px">${p.label}</div>
        <div class="person-mini-bar"><div class="person-mini-fill" style="width:${pct}%;background:${p.color}"></div></div>
      </div>
      <div class="person-count">${doneCount}/${items.length}</div>
    </div>`;
  });
  document.getElementById('person-stats').innerHTML = personHtml;
}

function showPage(name) {
  document.getElementById('page-list').classList.toggle('active', name === 'list');
  document.getElementById('page-stats').classList.toggle('active', name === 'stats');
  document.getElementById('nav-list').classList.toggle('active', name === 'list');
  document.getElementById('nav-stats').classList.toggle('active', name === 'stats');
  if (name === 'stats') renderStats();
}

// PWA install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  document.getElementById('install-banner').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
